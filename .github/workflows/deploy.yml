name: CI/CD BackJS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag y push imagen a ECR
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/backjs-eval3:$IMAGE_TAG .
          docker push $ECR_REGISTRY/backjs-eval3:$IMAGE_TAG
          docker tag $ECR_REGISTRY/backjs-eval3:$IMAGE_TAG $ECR_REGISTRY/backjs-eval3:latest
          docker push $ECR_REGISTRY/backjs-eval3:latest

      - name: Deploy a ECS
        run: |
          aws ecs update-service \
            --cluster eval3-cluster2 \
            --service backjs-service \
            --force-new-deployment \
            --region ${{ secrets.AWS_REGION }}